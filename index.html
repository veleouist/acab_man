<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>ACAB-MAN</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="APP_ICON.png" />
    <link rel="stylesheet" href="styles.css?v=27" />
  </head>
  <body>
    <div class="intro-screen" id="intro-screen" role="button" tabindex="0" aria-label="Start ACAB-MAN">
      <img src="assets/images/START_SCREEN.png" alt="Ghostmaster Toy Supply Company" />
      <p>Tap to start</p>
    </div>
    <div class="title-screen" id="title-screen" role="button" tabindex="0" aria-label="Play ACAB-MAN" hidden>
      <video autoplay loop muted playsinline preload="auto" aria-hidden="true">
        <source src="assets/video/TITLE_BACKGROUND.mp4.mp4" type="video/mp4" />
      </video>
      <img src="assets/images/logo.png" alt="ACAB-MAN" />
      <strong>Tap to continue</strong>
    </div>
    <div class="player-screen" id="player-screen" hidden>
      <section class="player-card" aria-labelledby="player-screen-title">
        <img src="assets/images/logo.png" alt="ACAB-MAN" />
        <div>
          <h1 id="player-screen-title">Enter the leaderboard</h1>
          <p>Choose the name that will be shown with your score.</p>
        </div>
        <form class="player-form" id="player-form">
          <label for="player-name">Player name</label>
          <input id="player-name" name="player-name" type="text" maxlength="16" autocomplete="nickname" required />
          <button class="player-start-button" type="submit">Start game</button>
        </form>
        <p class="leaderboard-message" id="player-leaderboard-message" role="status">Loading leaderboard…</p>
        <section class="leaderboard-card" aria-labelledby="player-leaderboard-title">
          <h2 id="player-leaderboard-title">Top 10</h2>
          <ol class="leaderboard-list" id="player-leaderboard-list"></ol>
        </section>
      </section>
    </div>
    <main class="game-shell">
      <canvas id="game-canvas" aria-label="ACAB-MAN game area"></canvas>
      <p class="status" id="status" aria-live="polite">Loading game…</p>
    </main>
    <button class="options-toggle" id="options-toggle" type="button" aria-controls="options-panel" aria-expanded="false" hidden>
      Options
    </button>
    <section class="options-panel" id="options-panel" aria-label="Game options" hidden>
      <div class="options-controls">
        <button class="pause-button" id="pause-button" type="button">Pause</button>
        <button class="sound-button" id="sound-button" type="button">Sound: on</button>
        <button class="haptics-button" id="haptics-button" type="button">Vibe: on</button>
        <button class="leaderboard-button" id="leaderboard-button" type="button">Scores</button>
        <button class="restart-button" id="restart-button" type="button" hidden>Play again</button>
      </div>
    </section>
    <div class="leaderboard-overlay" id="leaderboard-overlay" role="dialog" aria-modal="true" aria-labelledby="leaderboard-title" hidden>
      <section class="leaderboard-modal">
        <div class="leaderboard-heading">
          <h2 id="leaderboard-title">Leaderboard</h2>
          <button class="leaderboard-close" id="leaderboard-close" type="button">Close</button>
        </div>
        <p class="leaderboard-message" id="game-leaderboard-message" role="status">Loading leaderboard…</p>
        <ol class="leaderboard-list" id="game-leaderboard-list"></ol>
      </section>
    </div>
    <script type="module" src="src/main.js?v=28"></script>
  </body>
</html>
