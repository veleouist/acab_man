<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Square Chase</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="APP_ICON.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="intro-screen" id="intro-screen" role="button" tabindex="0" aria-label="Start Square Chase">
      <img src="START_SCREEN.png" alt="Ghostmaster Toy Supply Company" />
      <p>Tap to start</p>
    </div>
    <main class="game-shell">
      <canvas id="game-canvas" aria-label="Square Chase game area"></canvas>
      <p class="status" id="status" aria-live="polite">Loading game…</p>
      <nav class="touch-controls" aria-label="Movement controls">
        <button class="touch-control control-up" data-direction="up" type="button" aria-label="Move up">▲</button>
        <button class="touch-control control-left" data-direction="left" type="button" aria-label="Move left">◀</button>
        <button class="touch-control control-down" data-direction="down" type="button" aria-label="Move down">▼</button>
        <button class="touch-control control-right" data-direction="right" type="button" aria-label="Move right">▶</button>
      </nav>
      <button class="pause-button" id="pause-button" type="button">Pause</button>
      <button class="sound-button" id="sound-button" type="button">Sound on</button>
      <button class="restart-button" id="restart-button" type="button" hidden>Play again</button>
    </main>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
